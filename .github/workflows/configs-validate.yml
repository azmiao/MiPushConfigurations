name: Configs Validate and Update Index

on:
  push:
    branches:
      - "**"

  pull_request:
    types:
      - opened
      - synchronize
      - reopened

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  configs_validate:
    name: Validate configs and update index
    runs-on: ubuntu-latest

    container:
      image: python:3.13-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 允许后面的 git push 使用 GITHUB_TOKEN
          persist-credentials: true

      - name: Configure Debian mirrors
        run: |
          set -eu

          sed -i \
            -e 's#http://deb.debian.org/debian-security#https://mirrors.tuna.tsinghua.edu.cn/debian-security#g' \
            -e 's#http://security.debian.org/debian-security#https://mirrors.tuna.tsinghua.edu.cn/debian-security#g' \
            -e 's#http://deb.debian.org/debian#https://mirrors.tuna.tsinghua.edu.cn/debian#g' \
            /etc/apt/sources.list /etc/apt/sources.list.d/*.sources \
            2>/dev/null || true

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          root = Path(".")

          paths = sorted(root.glob("*.json"))
          paths.extend(sorted(root.glob("icon/*.json")))
          paths.extend(sorted(root.glob("_meta/*.json")))

          failed = False

          for path in paths:
              try:
                  json.loads(path.read_text(encoding="utf-8-sig"))
                  print(f"OK: {path}")
              except json.JSONDecodeError as error:
                  failed = True
                  print(
                      f"ERROR: {path}:{error.lineno}:{error.colno}: "
                      f"{error.msg}",
                      file=sys.stderr,
                  )
              except UnicodeDecodeError as error:
                  failed = True
                  print(
                      f"ERROR: {path}: invalid UTF-8: {error}",
                      file=sys.stderr,
                  )

          if failed:
              raise SystemExit("JSON validation failed")

          print(f"Validated {len(paths)} JSON files")
          PY

      - name: Generate config index
        run: |
          python tools/build_index.py

      # Pull Request 事件只校验及生成，不直接向 PR 分支推送。
      # push 和手动运行时自动提交索引。
      - name: Commit and push generated index
        if: github.event_name != 'pull_request'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -eu

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- _meta/config-index.json

          if git diff --cached --quiet; then
            echo "Config index is already up to date."
            exit 0
          fi

          git commit -m "chore: update config index [skip ci]"
          git push origin "HEAD:${BRANCH_NAME}"

      - name: Generate ref slug
        if: always()
        id: ref_slug
        env:
          REF_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re

          ref_name = os.environ.get("REF_NAME", "ref")
          ref_slug = re.sub(r"[^0-9a-z]+", "-", ref_name.lower())
          ref_slug = ref_slug.strip("-")[:63] or "ref"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"value={ref_slug}\n")
          PY

      - name: Upload config index
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MiPushConfigurations-index-${{ steps.ref_slug.outputs.value }}
          path: _meta/config-index.json
          retention-days: 14
          if-no-files-found: warn