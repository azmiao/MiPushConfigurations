name: Configs Validate

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.event_name }}-
    ${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  configs_validate:
    name: configs:validate

    runs-on: ubuntu-latest

    container:
      image: python:3.13-slim

    steps:
      - name: Determine whether pipeline should run
        id: pipeline_gate
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            if (context.eventName !== "push") {
              return "true";
            }

            if (context.ref.startsWith("refs/tags/")) {
              return "true";
            }

            const branch = context.ref.replace("refs/heads/", "");
            const { owner, repo } = context.repo;

            const { data: pullRequests } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${branch}`,
              per_page: 1
            });

            if (pullRequests.length > 0) {
              core.info(
                `Branch "${branch}" has an open pull request; skipping duplicate push validation.`
              );
              return "false";
            }

            return "true";

      - name: Checkout repository
        if: steps.pipeline_gate.outputs.result == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate ref slug
        if: always() && steps.pipeline_gate.outputs.result == 'true'
        id: ref_slug
        env:
          REF_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re

          ref_name = os.environ.get("REF_NAME", "ref")
          ref_slug = re.sub(r"[^0-9a-z]+", "-", ref_name.lower())
          ref_slug = ref_slug.strip("-")[:63] or "ref"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"value={ref_slug}\n")
          PY

      - name: Configure Debian mirrors
        if: steps.pipeline_gate.outputs.result == 'true'
        run: |
          set -eu
          sed -i \
            -e 's#http://deb.debian.org/debian-security#https://mirrors.tuna.tsinghua.edu.cn/debian-security#g' \
            -e 's#http://security.debian.org/debian-security#https://mirrors.tuna.tsinghua.edu.cn/debian-security#g' \
            -e 's#http://deb.debian.org/debian#https://mirrors.tuna.tsinghua.edu.cn/debian#g' \
            /etc/apt/sources.list /etc/apt/sources.list.d/*.sources \
            2>/dev/null || true

      - name: Install dependencies
        if: steps.pipeline_gate.outputs.result == 'true'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git

      - name: Validate JSON files
        if: steps.pipeline_gate.outputs.result == 'true'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path(".")
          paths = sorted(root.glob("*.json"))
          paths.extend(sorted(root.glob("icon/*.json")))
          paths.extend(sorted(root.glob("_meta/*.json")))

          for path in paths:
              json.loads(path.read_text(encoding="utf-8-sig"))

          print(f"validated {len(paths)} json files")
          PY

      - name: Check generated index
        if: steps.pipeline_gate.outputs.result == 'true'
        run: python tools/build_index.py --check

      - name: Upload config index
        if: always() && steps.pipeline_gate.outputs.result == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: MiPushConfigurations-index-${{ steps.ref_slug.outputs.value }}
          path: _meta/config-index.json
          retention-days: 14
          if-no-files-found: warn