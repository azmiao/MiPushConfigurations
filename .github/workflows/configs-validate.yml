name: Configs Validate and Update Index

on:
  # 支持手动触发
  workflow_dispatch:

  push:
    branches:
      - "**"
    paths:
      - "*.json"
      - "icon/*.json"
      - "_meta/*.json"
      - "!_meta/config-index.json"
      - "tools/build_index.py"
      - ".github/workflows/configs-validate.yml"

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "*.json"
      - "icon/*.json"
      - "_meta/*.json"
      - "!_meta/config-index.json"
      - "tools/build_index.py"
      - ".github/workflows/configs-validate.yml"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  configs_validate:
    name: Validate configs and update index

    # 使用 GitHub 托管 Runner
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # build_index.py 需要通过 git log 获取文件更新时间
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify environment
        run: |
          set -euo pipefail

          echo "Current directory:"
          pwd

          echo "Python version:"
          python --version

          echo "Git version:"
          git --version

          echo "Workspace contents:"
          ls -la

          if [[ ! -d ".git" ]]; then
            echo "::error::.git directory was not found after checkout"
            exit 1
          fi

          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          echo "Repository status:"
          git status --short

          echo "Current commit:"
          git rev-parse HEAD

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          root = Path(".")

          paths = sorted(root.glob("*.json"))
          paths.extend(sorted(root.glob("icon/*.json")))

          # 校验 _meta 中除自动生成索引外的其他 JSON。
          paths.extend(
              path
              for path in sorted(root.glob("_meta/*.json"))
              if path.name != "config-index.json"
          )

          failed = False

          for path in paths:
              try:
                  text = path.read_text(encoding="utf-8-sig")
                  json.loads(text)
                  print(f"OK: {path}")
              except json.JSONDecodeError as error:
                  failed = True
                  print(
                      f"ERROR: {path}:{error.lineno}:{error.colno}: "
                      f"{error.msg}",
                      file=sys.stderr,
                  )
              except UnicodeDecodeError as error:
                  failed = True
                  print(
                      f"ERROR: {path}: not valid UTF-8: {error}",
                      file=sys.stderr,
                  )
              except OSError as error:
                  failed = True
                  print(
                      f"ERROR: unable to read {path}: {error}",
                      file=sys.stderr,
                  )

          if failed:
              raise SystemExit("JSON validation failed")

          print(f"Validated {len(paths)} JSON files")
          PY

      - name: Generate config index
        env:
          INDEX_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail

          echo "Generating index for branch: ${INDEX_BRANCH}"
          python tools/build_index.py

      - name: Validate generated index
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("_meta/config-index.json")

          if not path.is_file():
              raise SystemExit(f"Generated index does not exist: {path}")

          try:
              index = json.loads(path.read_text(encoding="utf-8-sig"))
          except json.JSONDecodeError as error:
              raise SystemExit(
                  f"{path}:{error.lineno}:{error.colno}: {error.msg}"
              ) from error

          required_keys = {
              "sourceRepo",
              "branch",
              "generatedAt",
              "files",
          }

          missing_keys = required_keys - set(index)

          if missing_keys:
              raise SystemExit(
                  "Generated index is missing keys: "
                  + ", ".join(sorted(missing_keys))
              )

          if not isinstance(index["files"], list):
              raise SystemExit(
                  'Generated index field "files" must be a list'
              )

          required_file_keys = {
              "path",
              "name",
              "sha",
              "size",
              "updatedAt",
          }

          for position, item in enumerate(index["files"]):
              if not isinstance(item, dict):
                  raise SystemExit(
                      f"files[{position}] must be an object"
                  )

              missing_file_keys = required_file_keys - set(item)

              if missing_file_keys:
                  raise SystemExit(
                      f"files[{position}] is missing keys: "
                      + ", ".join(sorted(missing_file_keys))
                  )

          print(
              f"Generated index contains {len(index['files'])} files"
          )
          PY

      # Pull Request 事件只校验和生成，不向来源分支推送。
      # push 或在分支上手动运行时自动提交索引。
      - name: Commit and push generated index
        if: >-
          github.event_name != 'pull_request' &&
          startsWith(github.ref, 'refs/heads/')
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- _meta/config-index.json

          if git diff --cached --quiet; then
            echo "Config index is already up to date."
            exit 0
          fi

          echo "Generated index changes:"
          git diff --cached --stat
          git diff --cached -- _meta/config-index.json

          git commit -m "chore: update config index [skip ci]"
          git push origin "HEAD:refs/heads/${BRANCH_NAME}"

      - name: Generate artifact name
        if: always()
        id: artifact_name
        env:
          REF_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re

          ref_name = os.environ.get("REF_NAME") or "ref"
          slug = re.sub(r"[^0-9a-z]+", "-", ref_name.lower())
          slug = slug.strip("-")[:63] or "ref"

          with open(
              os.environ["GITHUB_OUTPUT"],
              "a",
              encoding="utf-8",
          ) as output:
              output.write(f"value={slug}\n")
          PY

      - name: Upload config index
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MiPushConfigurations-index-${{ steps.artifact_name.outputs.value }}
          path: _meta/config-index.json
          retention-days: 14
          if-no-files-found: warn